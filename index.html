<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spynel | Graphic Designer & Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    /* Splash screen géré par transition CSS */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #0A0A0A;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out;
    }

    #splash-screen.hide {
      opacity: 0;
      pointer-events: none;
    }

    /* Empêche le flash blanc initial */
    html,
    body {
      background: #0A0A0A;
      margin: 0;
      padding: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@100;300;400;700&display=swap">
</head>

<body>
  <div id="splash-screen">
    <div
      style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#3B82F6;border-radius:50%;animation:spin 0.8s linear infinite">
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
